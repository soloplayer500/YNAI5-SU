name: Block Syndicate — Daily Screener

on:
  schedule:
    - cron: '0 12 * * *'   # 8AM AST daily (Block Syndicate daily signal)
  workflow_dispatch:   # manual trigger still available

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create .env.local from secrets
        run: |
          cat > .env.local << 'EOF'
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          COINGECKO_API_KEY=${{ secrets.COINGECKO_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          EOF

      - name: Run screener bot
        run: |
          python projects/passive-income/screener-channel-bot.py

      - name: Commit log if changed
        run: |
          git config user.name  "YNAI5-Bot"
          git config user.email "bot@ynai5.local"
          git add projects/passive-income/logs/ || true
          git diff --staged --quiet || git commit -m "chore: screener log $(date -u +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
