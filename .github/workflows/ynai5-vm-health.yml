name: YNAI5 VM Health Check

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Run VM health check and notify Telegram
        env:
          VM_IP: ${{ secrets.VM_IP }}
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "$VM_SSH_KEY" > /tmp/vm_key
          chmod 600 /tmp/vm_key

          RESULT=$(ssh -i /tmp/vm_key -o StrictHostKeyChecking=no "shema@$VM_IP" bash << 'SSHEOF'
          OUT=""
          for ep in "/" "/status.json" "/api/status" "/api/ynai5logs"; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:8000${ep}" 2>/dev/null)
            mark=$([ "$code" = "200" ] && echo "OK" || echo "FAIL")
            OUT="${OUT}  ${mark} 8000${ep} -> ${code}\n"
          done
          for ep in "/health" "/api/env"; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:8001${ep}" 2>/dev/null)
            mark=$([ "$code" = "200" ] && echo "OK" || echo "FAIL")
            OUT="${OUT}  ${mark} 8001${ep} -> ${code}\n"
          done
          RAM=$(free -m | awk '/Mem/{print $3"/"$2" MB"}')
          printf "%b\nRAM: %s\n" "$OUT" "$RAM"
          SSHEOF
          )

          FAIL_COUNT=$(echo "$RESULT" | grep -c "FAIL" || true)
          if [ "$FAIL_COUNT" -gt 0 ]; then
            STATUS="WARNING - ${FAIL_COUNT} endpoint(s) down"
          else
            STATUS="ALL OK - 6/6 endpoints healthy"
          fi

          MESSAGE="[YNAI5 VM] ${STATUS}
$(date -u '+%Y-%m-%d %H:%M UTC')
${RESULT}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}"

          echo "--- Result ---"
          echo "$RESULT"
          [ "$FAIL_COUNT" -gt 0 ] && exit 1 || exit 0
