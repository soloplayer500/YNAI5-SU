name: Ralph Autonomous Agent

on:
  # schedule: PAUSED 2026-03-29 — improve analysis/report quality before re-enabling
  workflow_dispatch:
    inputs:
      task:
        description: 'Inline task string (optional — uses tasks/current-task.md if blank)'
        required: false
        default: ''
      task_file:
        description: 'Task file path (e.g. tasks/current-task.md)'
        required: false
        default: 'tasks/current-task.md'

jobs:
  autonomous-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run autonomous agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd projects/ralph-automation

          if [ -n "${{ github.event.inputs.task }}" ]; then
            echo "Running with inline task..."
            python autonomous-agent.py --task "${{ github.event.inputs.task }}"
          else
            TASK_FILE="${{ github.event.inputs.task_file }}"
            TASK_FILE="${TASK_FILE:-tasks/current-task.md}"
            echo "Running with task file: $TASK_FILE"
            python autonomous-agent.py "$TASK_FILE"
          fi

      - name: Commit session output
        run: |
          git config user.name "YNAI5 Autonomous Agent"
          git config user.email "ynai5-agent@noreply.github.com"
          git add projects/ralph-automation/sessions/
          git diff --staged --quiet || git commit -m "agent: session $(date +%Y-%m-%d-%H%M)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
