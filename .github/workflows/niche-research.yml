name: BRAINAI5 Niche Research (Fully Automated)

on:
  workflow_dispatch:
    inputs:
      niche_query:
        description: "Niche to research (e.g. 'betrayal karma narratives')"
        required: true
        type: string

jobs:
  research-and-deepdive:
    name: Research → Sheets → Dashboard → Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Phase 1 — Niche Research
        env:
          NICHE_QUERY: ${{ inputs.niche_query }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python projects/niche-research/niche_research.py

      - name: Derive slug from query
        id: slug
        run: |
          SLUG=$(python -c "import re; print(re.sub(r'[^a-z0-9]+', '-', '${{ inputs.niche_query }}'.lower()).strip('-'))")
          echo "value=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Phase 2 — Sheets + Dashboard + Telegram Report
        env:
          NICHE_SLUG: ${{ steps.slug.outputs.value }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python projects/niche-research/niche_deepdive.py

      - name: Commit all output
        run: |
          git config user.name "BRAINAI5 Bot"
          git config user.email "brainai5@ynai5.local"
          git add projects/niche-research/output/ || true
          git diff --staged --quiet || git commit -m "feat: niche research complete — ${{ inputs.niche_query }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
